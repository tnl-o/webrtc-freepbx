version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: webrtc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-webrtc}
      POSTGRES_USER: ${DB_USER:-webrtc}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-webrtcpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-webrtc} -d ${DB_NAME:-webrtc}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - webrtc_net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: webrtc_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-webrtc}
      DB_USER: ${DB_USER:-webrtc}
      DB_PASSWORD: ${DB_PASSWORD:-webrtcpass}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    networks:
      - webrtc_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-3000}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ""
    container_name: webrtc_client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${CLIENT_PORT:-80}:80"
    networks:
      - webrtc_net

volumes:
  postgres_data:

networks:
  webrtc_net:
    driver: bridge
