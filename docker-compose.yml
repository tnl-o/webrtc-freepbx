# ==============================================================================
# WebRTC Phone — браузерный SIP-телефон (LAN)
# ==============================================================================
# АТС (Asterisk / FreePBX) поднимается отдельно на другом сервере.
#
# Быстрый старт:
#   docker compose up -d
#   Откройте http://<IP-хоста>:${PHONE_PORT:-80}
#   Укажите extension, SIP-пароль и ws/wss URL вашей АТС.
# ==============================================================================

services:
  phone:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: webrtc-phone
    restart: unless-stopped
    ports:
      - "${PHONE_PORT:-80}:80"
    networks:
      - phone_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  phone_net:
    driver: bridge
