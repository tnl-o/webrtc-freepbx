[general]
enabled = yes
bindaddr = 0.0.0.0
bindport = 8088

; TLS / WSS support
tlsenable = yes
tlsbindaddr = 0.0.0.0:8089
tlscertfile = /etc/asterisk/keys/asterisk.pem
tlsprivatekey = /etc/asterisk/keys/asterisk.pem

; Serve static files (needed for some Asterisk web interfaces)
enablestatic = yes

; Redirect root to the Asterisk admin panel (optional, harmless)
; redirect = / /httpstatus
