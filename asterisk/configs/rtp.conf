[general]
; RTP port range — keep small (101 ports) for manageable Docker port mapping
rtpstart = 10000
rtpend   = 10100

; ── DTLS-SRTP (required for WebRTC, even on plain ws:// transport) ─────────
dtlsenable     = yes
dtlsverify     = fingerprint
dtlscertfile   = /etc/asterisk/keys/asterisk.pem
dtlsprivatekey = /etc/asterisk/keys/asterisk.pem
dtlssetup      = actpass

; ── ICE (required for WebRTC peer connection establishment) ────────────────
icesupport = yes

; STUN is optional in a clean LAN with no NAT.
; Uncomment and set to a local STUN server if you have NAT between
; the Asterisk host and the browser clients.
; stunaddr = stun.example.local:3478
