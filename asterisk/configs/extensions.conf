[general]
static = yes
writeprotect = no
clearglobalvars = no

[globals]
; Global variables can be defined here if needed

;==========================
; WebRTC SIP Context
;==========================
[from-webrtc]

; Dial any 4-digit extension in the 1XXX range
exten => _1XXX,1,NoOp(Incoming call from ${CALLERID(all)} to ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

; *43 — Echo test: hear your own audio back (useful for latency/quality testing)
exten => *43,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; *99 — Audio playback test: plays demo-congrats sound file
exten => *99,1,Answer()
 same => n,Playback(demo-congrats)
 same => n,Hangup()

; i — Invalid extension handler
exten => i,1,Hangup(16)

; h — Hangup handler (runs when a call ends)
exten => h,1,NoOp(Call to ${EXTEN} has ended)
